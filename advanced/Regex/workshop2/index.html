<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Palindrome Checker</title>
    <link rel="stylesheet" href="./styles.css">
</head>

<body>
    <header>
        <h1>Is it a Palindrome?</h1>
    </header>
    <main>
		<div class="info-banner">
			<span>💡</span>
			<p>A palindrome is a word or sentence that's spelled the same way both forward and backward, ignoring punctuation, case, and spacing.</p>
		</div>
        <label>Enter in text to check for a plalindrome</label>
       <textarea id="text-input" cols="35" rows="7" placeholder="e.g. race car, level, _eye..."></textarea>
        <button id="check-btn">Check</button>
        <div id="result"></div>
    </main>
    <script src="./script.js"></script>
</body>

</html>
